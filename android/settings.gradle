pluginManagement {
    def androidGradlePluginVersion = "7.3.1"
    def kotlinVersion = "1.7.10"
    
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
    resolutionStrategy {
        eachPlugin {
            if (requested.id.id == "com.android.application") {
                useModule("com.android.tools.build:gradle:$androidGradlePluginVersion")
            }
            if (requested.id.id == "org.jetbrains.kotlin.android") {
                useModule("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
            }
        }
    }
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.name = "android"
include ':app'

def flutterSdkPath = System.getenv("FLUTTER_ROOT")
if (flutterSdkPath == null) {
    def localPropertiesFile = new File(rootDir, "local.properties")
    if (localPropertiesFile.exists()) {
        def properties = new Properties()
        localPropertiesFile.withInputStream { properties.load(it) }
        flutterSdkPath = properties.getProperty("flutter.sdk")
    }
}
assert flutterSdkPath != null, "flutter.sdk not set in local.properties or FLUTTER_ROOT"

apply from: "${flutterSdkPath}/packages/flutter_tools/gradle/app_plugin_loader.gradle"
