workflows:
  android-workflow:
    name: Android Workflow
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Set up project
        script: |
          if [ ! -d "android" ]; then
            flutter create .
            git checkout HEAD -- lib/main.dart
          fi
      - name: Fix Gradle for AdMob
        script: |
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-all.zip" > android/gradle/wrapper/gradle-wrapper.properties
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.22"/' android/build.gradle
      - name: Get dependencies
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk