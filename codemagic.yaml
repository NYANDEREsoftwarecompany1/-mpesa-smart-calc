workflows:
  android-workflow:
    name: Android Workflow
    environment:
      flutter: stable
    scripts:
      - name: Set up project
        script: |
          if [ ! -d "android" ]; then
            flutter create .
            # Restore our custom main.dart after create
            git checkout HEAD -- lib/main.dart
          fi
      - name: Get dependencies
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk