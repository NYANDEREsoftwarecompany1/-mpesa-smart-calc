name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: false

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: FIND THE V1 FILE
        run: |
          echo "=== SEARCHING FOR V1 EMBEDDING CODE ==="
          echo "If anything prints below, THAT FILE is killing your build:"
          grep -r "io.flutter.app" android/ || echo "No io.flutter.app found"
          echo "=== LISTING ALL MANIFESTS ==="
          find android/ -name "AndroidManifest.xml"
          echo "=== LISTING ALL MAINACTIVITY FILES ==="
          find android/ -name "MainActivity.*"
          echo "=== DONE SEARCHING ==="
          
      - name: Nuke v1 cache and get packages
        run: |
          flutter clean
          rm -rf android/app/src/debug
          rm -rf android/app/src/profile
          rm -rf android/app/src/main/java
          rm -rf build
          flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mpesa-smart-calc-release
          path: build/app/outputs/flutter-apk/app-release.apk
