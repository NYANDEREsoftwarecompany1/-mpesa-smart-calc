name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: false

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: PROVE THE MANIFEST IS V2
        run: |
          echo "=== YOUR ACTUAL AndroidManifest.xml CONTENT ==="
          cat android/app/src/main/AndroidManifest.xml
          echo "=== CHECKING FOR V2 FLAG ==="
          grep "flutterEmbedding" android/app/src/main/AndroidManifest.xml || echo "❌ V2 FLAG MISSING - THIS IS THE BUG"
          echo "=== CHECKING FOR V1 NAME ==="
          grep "io.flutter.app.FlutterApplication" android/app/src/main/AndroidManifest.xml && echo "❌ V1 NAME FOUND - THIS IS THE BUG" || echo "✅ No V1 name found"

      - name: Nuke v2 cache and get packages
        run: |
          flutter clean
          rm -rf android/app/src/debug
          rm -rf android/app/src/profile
          rm -rf android/app/src/main/java
          rm -rf build
          flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mpesa-smart-calc-release
          path: build/app/outputs/flutter-apk/app-release.apk
